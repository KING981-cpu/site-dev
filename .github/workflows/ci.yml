name: CI

on:
  push:
    branches:
      - main
      - staging
      - developer
  pull_request:
    branches:
      - main
      - staging
      - developer

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install metadata
        run: npm ci

      - name: Run unit and structure tests
        run: npm test

  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install metadata
        run: npm ci

      - name: Run smoke browser
        run: npm run test:smoke
