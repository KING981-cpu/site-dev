<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnCodigo | Enterprise OS</title>
    
    <!-- Frameworks & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --accent: #06b6d4;
            --bg-dark: #030303;
            --card-bg: rgba(15, 15, 18, 0.6);
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f4f4f5;
            overflow: hidden;
            margin: 0;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .nav-active {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent) !important;
            border-right: 3px solid var(--accent);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #18181b; border-radius: 10px; }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }

        .message-appear {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex text-sm selection:bg-cyan-500/30">

    <!-- 
      ⚠️ ÁREA DE CONFIGURAÇÃO ⚠️
      Substitua os valores abaixo para ativar o sistema real.
    -->
    <script>
        // Substitua aqui pelas suas credenciais
        const SUPABASE_URL = 'https://ckamxscxszvtkvspksov.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrYW14c2N4c3p2dGt2c3Brc292Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNDU1MDUsImV4cCI6MjA4NzcyMTUwNX0.SSj3h17WN5Ks4NmFouubFmmXejwdNROhXj5s2f91C7Y';

        // Renomeado para evitar conflito com a biblioteca global 'supabase'
        let supabaseClient = null;
        let currentUser = { id: 'user_' + Math.floor(Math.random() * 1000), name: 'Utilizador Demo' };

        // Inicialização do Cliente
        try {
            if (SUPABASE_URL !== 'COLE_AQUI_A_SUA_URL' && SUPABASE_URL.startsWith('http')) {
                // Usamos a função global da biblioteca para criar o nosso cliente específico
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase Client inicializado com sucesso.");
            }
        } catch (e) {
            console.error("Erro ao conectar ao Supabase:", e);
        }
    </script>

    <!-- Sidebar -->
    <aside class="w-64 glass-panel border-r border-zinc-900 flex flex-col z-50">
        <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i data-lucide="shield-check" class="w-6 h-6 text-black"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight leading-none">LearnCodigo</h1>
                    <span class="text-[10px] text-cyan-500 font-mono font-bold uppercase tracking-widest">Enterprise OS</span>
                </div>
            </div>

            <nav class="space-y-1 mb-8">
                <p class="text-[10px] uppercase font-bold text-zinc-600 tracking-widest px-3 mb-2">Workspace</p>
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-zinc-400 hover:bg-white/5 transition-all">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
                </button>
                <button onclick="navigate('chat')" id="nav-chat" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-zinc-400 hover:bg-white/5 transition-all">
                    <i data-lucide="message-square" class="w-4 h-4"></i> Comunicação
                </button>
                <button onclick="navigate('gitflow')" id="nav-gitflow" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-zinc-400 hover:bg-white/5 transition-all">
                    <i data-lucide="git-branch" class="w-4 h-4"></i> Gitflow
                </button>
            </nav>
        </div>

        <div class="p-4 border-t border-zinc-900 bg-black/40">
            <div class="flex items-center gap-3 p-2 rounded-lg">
                <div class="relative">
                    <div class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-xs border border-zinc-700">LC</div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#030303] rounded-full"></div>
                </div>
                <div class="truncate">
                    <p class="font-bold text-xs truncate" id="display-user-name">Utilizador</p>
                    <p class="text-[9px] text-zinc-500 font-mono" id="conn-status">OFFLINE_MODE</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div class="scanline"></div>
        <header class="h-16 border-b border-zinc-900 flex items-center justify-between px-8 bg-black/20 backdrop-blur-md z-40">
            <div id="view-title" class="flex items-center gap-2 text-xs font-bold uppercase tracking-[0.2em] text-zinc-400">
                SYSTEM <span class="text-white">/</span> DASHBOARD
            </div>
            <div id="connection-badge" class="flex items-center gap-2 px-3 py-1 rounded-full bg-zinc-900 border border-zinc-800">
                <!-- Inserido dinamicamente -->
            </div>
        </header>

        <div id="app-viewport" class="flex-1 overflow-y-auto custom-scrollbar p-8">
            <!-- Renderizado via JS -->
        </div>
    </main>

    <script>
        // Lógica de Navegação
        function navigate(page) {
            const viewport = document.getElementById('app-viewport');
            const title = document.getElementById('view-title');
            
            // UI Update
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('nav-active');

            if (page === 'dashboard') {
                title.innerHTML = `SYSTEM <span class="text-white mx-2">/</span> DASHBOARD`;
                renderDashboard(viewport);
            } else if (page === 'chat') {
                title.innerHTML = `COMMUNICATION <span class="text-white mx-2">/</span> GLOBAL_CHAT`;
                renderChat(viewport);
            } else if (page === 'gitflow') {
                title.innerHTML = `PRODUCTION <span class="text-white mx-2">/</span> GITFLOW`;
                renderGitflow(viewport);
            }
            lucide.createIcons();
        }

        // --- DASHBOARD ---
        function renderDashboard(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-panel p-6 rounded-2xl border-l-4 border-cyan-500">
                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Commits</p>
                        <h3 class="text-3xl font-mono font-bold">1,204</h3>
                    </div>
                    <div class="glass-panel p-6 rounded-2xl border-l-4 border-emerald-500">
                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Tarefas</p>
                        <h3 class="text-3xl font-mono font-bold">42</h3>
                    </div>
                    <div class="glass-panel p-6 rounded-2xl border-l-4 border-purple-500">
                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Uptime</p>
                        <h3 class="text-3xl font-mono font-bold">99.9%</h3>
                    </div>
                </div>
                <div class="glass-panel p-8 rounded-3xl border border-zinc-900">
                    <h4 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4 text-cyan-500"></i> Atividade da Equipa</h4>
                    <div class="space-y-4 font-mono text-[11px] text-zinc-500" id="logs-container">
                        <p>> Sistema inicializado em modo local...</p>
                        ${supabaseClient ? '<p class="text-emerald-500">> Conectado ao Supabase Cloud.</p>' : '<p class="text-amber-500">> Aguardando configuração do Supabase para logs reais.</p>'}
                    </div>
                </div>
            `;
        }

        // --- CHAT REAL ---
        function renderChat(container) {
            container.innerHTML = `
                <div class="h-full flex flex-col glass-panel rounded-2xl overflow-hidden border border-zinc-900">
                    <div id="chat-messages" class="flex-1 p-6 space-y-4 overflow-y-auto custom-scrollbar bg-black/10">
                        <div class="text-center py-10 opacity-40">
                            <i data-lucide="message-square" class="w-10 h-10 mx-auto mb-2"></i>
                            <p class="text-xs">As mensagens aparecerão aqui em tempo real quando ligares o banco de dados.</p>
                        </div>
                    </div>
                    <div class="p-4 bg-zinc-900/50 border-t border-zinc-900 flex gap-2">
                        <input id="chat-input" type="text" placeholder="Escreve uma mensagem..." class="flex-1 bg-black/50 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all">
                        <button onclick="sendMessage()" class="bg-cyan-500 text-black px-6 rounded-xl font-bold hover:bg-cyan-400 transition-all">ENVIAR</button>
                    </div>
                </div>
            `;
            if(supabaseClient) subscribeToChat();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;

            if(!supabaseClient) {
                const logs = document.getElementById('chat-messages');
                logs.innerHTML += `<p class="text-[10px] text-amber-500 font-mono text-center">Aviso: Configura o Supabase para enviar mensagens reais.</p>`;
                return;
            }

            const { error } = await supabaseClient.from('messages').insert([
                { user_name: currentUser.name, content: input.value }
            ]);

            if(!error) input.value = '';
        }

        function subscribeToChat() {
            if(!supabaseClient) return;

            supabaseClient.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                const container = document.getElementById('chat-messages');
                if(!container) return;

                const div = document.createElement('div');
                div.className = `flex flex-col ${msg.user_name === currentUser.name ? 'items-end' : 'items-start'} message-appear`;
                div.innerHTML = `
                    <span class="text-[9px] text-zinc-600 mb-1 font-mono">${msg.user_name}</span>
                    <div class="px-4 py-2 rounded-2xl ${msg.user_name === currentUser.name ? 'bg-cyan-500 text-black' : 'bg-zinc-800 text-zinc-200'} border border-white/5 max-w-[80%]">
                        ${msg.content}
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }).subscribe();
        }

        // --- GITFLOW ---
        function renderGitflow(container) {
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="glass-panel p-4 rounded-xl flex items-center justify-between border border-zinc-800">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-zinc-800 flex items-center justify-center"><i data-lucide="git-pull-request" class="w-4 h-4 text-amber-500"></i></div>
                            <div><p class="font-bold">feat: voice-channels</p><p class="text-[10px] text-zinc-500">Author: DevAlpha</p></div>
                        </div>
                        <button class="text-[10px] font-bold bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded">APPROVE</button>
                    </div>
                </div>
            `;
        }

        function updateStatusUI() {
            const badge = document.getElementById('connection-badge');
            const statusText = document.getElementById('conn-status');
            
            if (supabaseClient) {
                badge.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-[9px] font-bold text-emerald-500 uppercase">Sistema Ativo</span>`;
                statusText.innerText = 'PRO_CONNECTED';
                statusText.className = "text-[9px] text-emerald-500 font-mono";
            } else {
                badge.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-amber-500"></div><span class="text-[9px] font-bold text-amber-500 uppercase tracking-tighter">Configuração Pendente</span>`;
            }
        }

        // Inicialização
        window.onload = () => {
            updateStatusUI();
            navigate('dashboard');
            lucide.createIcons();
        };
    </script>
</body>
</html>
