<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profissional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #e2e8f0;
        }
        body.light {
            background-color: #f9f9f9;
            color: #1a1a1a;
        }
        body.light .sidebar {
            background-color: #fff;
            border-right: 1px solid #ddd;
        }
        body.light .card {
            background-color: #fff;
            border: 1px solid #ddd;
        }
        body.light .btn-sidebar {
            color: #555;
        }
        body.light .btn-sidebar:hover, body.light .btn-sidebar.active {
            background-color: #00bcd4;
            color: #000;
        }

        .sidebar {
            background-color: #1a1a1a;
            border-right: 1px solid #2d2d2d;
        }

        .card {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
        }

        .btn-sidebar {
            transition: all 0.2s;
            color: #94a3b8;
        }

        .btn-sidebar:hover, .btn-sidebar.active {
            background-color: #00bcd4;
            color: #000;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .cell-with-event::after {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background: #00bcd4;
            border-radius: 50%;
            margin: 0 auto;
            margin-top: 2px;
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden">

    <div id="app" class="h-screen flex">
        <!-- Conteúdo dinâmico -->
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        // --- SUPABASE CONFIGURATION (replace with your project's values) ---
        const SUPABASE_URL = 'https://ckamxscxszvtkvspksov.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrYW14c2N4c3p2dGt2c3Brc292Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNDU1MDUsImV4cCI6MjA4NzcyMTUwNX0.SSj3h17WN5Ks4NmFouubFmmXejwdNROhXj5s2f91C7Y';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // listen for auth state changes
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                state.isLoggedIn = true;
                state.userEmail = session.user.email;
                loadUserData().then(() => render());
            } else if (event === 'SIGNED_OUT') {
                state.isLoggedIn = false;
                render();
            }
        });

        const INITIAL_LINKS = [
            { id: '1', name: 'Deepsek', url: 'https://www.deepseek.com/', color: 'bg-black text-white' },
            { id: '2', name: 'Resposta Certa', url: 'https://respostacerta.com/', color: 'bg-red-500 text-white' },
            { id: '3', name: 'Gemini', url: 'https://gemini.google.com', color: 'bg-emerald-500 text-white' },
            { id: '4', name: 'Estude Sem Fronteiras', url: 'https://www.estudesemfronteiras.com/', color: 'bg-purple-600 text-white' },
        ];

        let state = {
            isLoggedIn: false,
            userEmail: '',
            links: INITIAL_LINKS.slice(),
            isModalOpen: false,
            activeTab: 'Dashboard',
            theme: localStorage.getItem('pro_dashboard_theme') || 'dark',
            // cronômetro state
            timerRunning: false,
            timerStart: null, // timestamp when started
            timerElapsed: 0, // milliseconds already elapsed
            timerIntervalId: null,
            // calendário state
            events: [],
            currentMonth: new Date(),
            selectedDate: null,
            // tarefas e notas
            tasks: [],
            notes: []
        };

        const appContainer = document.getElementById('app');

        async function render() {
            applyTheme();
            if (!state.isLoggedIn) {
                renderLogin();
            } else {
                // fetch user data from Supabase once when rendering main layout
                await loadUserData();
                renderMainLayout();
            }
            lucide.createIcons();
        }

        // --- LOGIN ---
        function renderLogin() {
            const dark = state.theme === 'dark';
            appContainer.className = `h-screen flex items-center justify-center ${dark ? 'bg-[#0a0a0a]' : 'bg-[#f0f0f0]'}`;
            appContainer.innerHTML = `
                <div class="max-w-md w-full p-8 card rounded-2xl shadow-2xl fade-in">
                    <div class="text-center mb-8">
                        <div class="bg-cyan-500/10 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-cyan-500/20">
                            <i data-lucide="rocket" class="text-cyan-400 w-10 h-10"></i>
                        </div>
                        <h1 class="text-2xl font-bold ${dark ? 'text-white' : 'text-black'}">Aceder ao Sistema</h1>
                        <p class="${dark ? 'text-slate-500' : 'text-gray-600'} mt-2">Introduza as suas credenciais</p>
                    </div>
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label class="block text-xs font-semibold ${dark ? 'text-slate-400' : 'text-gray-700'} uppercase tracking-wider mb-2">Email</label>
                            <input type="email" id="email" class="w-full bg-[#121212] border border-[#333] p-3 rounded-xl focus:border-cyan-500 outline-none transition-all text-white" placeholder="utilizador@exemplo.com" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold ${dark ? 'text-slate-400' : 'text-gray-700'} uppercase tracking-wider mb-2">Senha</label>
                            <input type="password" id="password" class="w-full bg-[#121212] border border-[#333] p-3 rounded-xl focus:border-cyan-500 outline-none transition-all text-white" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition-all shadow-lg shadow-cyan-500/20">Entrar</button>
                    </form>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;

                const { data, error } = await sb.auth.signInWithPassword({
                    email,
                    password: pass
                });

                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        // user does not exist, sign up
                        const { data: signUpData, error: signUpError } = await sb.auth.signUp({
                            email,
                            password: pass
                        });
                        if (signUpError) {
                            alert(signUpError.message);
                            return;
                        }
                        state.isLoggedIn = true;
                        state.userEmail = signUpData.user.email;
                        await loadUserData();
                        render();
                    } else {
                        alert(error.message);
                    }
                } else {
                    state.isLoggedIn = true;
                    state.userEmail = data.user.email;
                    await loadUserData();
                    render();
                }
            };
        }

        // --- LAYOUT PRINCIPAL (SIDEBAR + CONTEÚDO) ---
        function renderMainLayout() {
            appContainer.className = "h-screen flex w-full";
            appContainer.innerHTML = `
                <!-- Sidebar -->
                <aside class="sidebar w-64 flex flex-col p-4 shrink-0">
                    <div class="mb-8 px-2 flex items-center gap-2">
                        <div class="w-8 h-8 bg-cyan-500 rounded flex items-center justify-center">
                            <i data-lucide="zap" class="w-5 h-5 text-black"></i>
                        </div>
                        <span class="font-bold text-lg tracking-tight">PLATAFORMA</span>
                    </div>

                    <div class="space-y-1 flex-1">
                        <p class="text-[10px] font-bold text-slate-500 px-3 mb-2 uppercase tracking-[0.2em]">Navegação</p>
                        ${renderSidebarBtn('layout-dashboard', 'Dashboard')}
                        ${renderSidebarBtn('clock', 'Cronómetro')}
                        ${renderSidebarBtn('list-todo', 'Tarefas')}
                        ${renderSidebarBtn('file-text', 'Notas')}
                        ${renderSidebarBtn('users', 'Equipe')}
                        ${renderSidebarBtn('calendar', 'Calendário')}

                        <p class="text-[10px] font-bold text-slate-500 px-3 mt-8 mb-2 uppercase tracking-[0.2em]">Atalhos</p>
                        <div id="sidebarLinks" class="space-y-1">
                            ${state.links.slice(0, 4).map(l => `
                                <a href="${l.url}" target="_blank" class="btn-sidebar flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium">
                                    <i data-lucide="bot" class="w-4 h-4"></i> ${l.name}
                                </a>
                            `).join('')}
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-[#2d2d2d] space-y-1">
                        <p class="text-[10px] font-bold text-slate-500 px-3 mb-2 uppercase tracking-[0.2em]">Preferências</p>
                        <button onclick="toggleTheme()" class="btn-sidebar w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium">
                            <i data-lucide="${state.theme==='dark' ? 'moon' : 'sun'}" class="w-4 h-4"></i> Tema
                        </button>
                        <button onclick="logout()" class="btn-sidebar w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium hover:!bg-red-500/10 hover:!text-red-500">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                        </button>
                    </div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 flex flex-col overflow-hidden bg-[#121212]">
                    <!-- Header -->
                    <header class="h-16 flex items-center justify-between px-8 border-b border-[#2d2d2d]">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">🚀</span>
                            <h2 class="text-xl font-bold">Olá, ${state.userEmail.split('@')[0] || 'Utilizador'}!</h2>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <span class="text-xs text-slate-400 font-medium">Online</span>
                        </div>
                    </header>

                    <!-- Scrollable Area -->
                    <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                        ${getContentForTab()}
                    </div>
                </main>

                <!-- Modal para adicionar links -->
                <div id="modal" class="fixed inset-0 modal-bg hidden items-center justify-center z-50 p-4">
                    <div class="card rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                        <div class="px-6 py-4 border-b border-[#2d2d2d] flex justify-between items-center">
                            <h3 class="font-bold text-white">Gerir Atalhos</h3>
                            <button onclick="toggleModal(false)" class="text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
                        </div>
                        <div class="p-6">
                             <div class="mb-4 space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-2">
                                ${state.links.map(l => `
                                    <div class="flex justify-between items-center p-2 bg-[#121212] rounded-lg border border-[#333]">
                                        <span class="text-sm font-medium">${l.name}</span>
                                        <button onclick="removeLink('${l.id}')" class="text-red-500 hover:bg-red-500/10 p-1 rounded transition-colors">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                `).join('')}
                             </div>
                             <hr class="border-[#2d2d2d] mb-4">
                             <form id="addLinkForm" class="space-y-4">
                                <input type="text" id="siteName" placeholder="Nome do Site" class="w-full bg-[#121212] border border-[#333] p-2 rounded-lg text-white outline-none focus:border-cyan-500" required>
                                <input type="text" id="siteUrl" placeholder="URL (ex: google.com)" class="w-full bg-[#121212] border border-[#333] p-2 rounded-lg text-white outline-none focus:border-cyan-500" required>
                                <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-2 rounded-lg hover:bg-cyan-400 transition-colors">Adicionar Novo</button>
                             </form>
                        </div>
                    </div>
                </div>
            `;

            // Lógica do Form
            document.getElementById('addLinkForm').onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('siteName').value;
                let url = document.getElementById('siteUrl').value;
                if(!url.startsWith('http')) url = 'https://' + url;
                
                state.links.push({
                    id: Date.now().toString(),
                    name: name,
                    url: url,
                    color: 'bg-slate-700 text-white'
                });
                await saveLinks();
                render();
            };
            const evtForm = document.getElementById('eventForm');
            if (evtForm) {
                evtForm.onsubmit = async (e) => {
                    e.preventDefault();
                    if (!state.selectedDate) return;
                    const text = document.getElementById('eventText').value.trim();
                    if (!text) return;
                    await addEvent(state.selectedDate, text);
                };
            }
            const taskForm = document.getElementById('taskForm');
            if (taskForm) {
                taskForm.onsubmit = async e => {
                    e.preventDefault();
                    const t = document.getElementById('taskInput').value.trim();
                    if (!t) return;
                    await addTask(t);
                };
            }
            const noteForm = document.getElementById('noteForm');
            if (noteForm) {
                noteForm.onsubmit = async e => {
                    e.preventDefault();
                    const n = document.getElementById('noteInput').value.trim();
                    if (!n) return;
                    await addNote(n);
                };
            }
        }

        function renderSidebarBtn(icon, label) {
            const isActive = state.activeTab === label;
            return `
                <button onclick="setActiveTab('${label}')" class="btn-sidebar w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium ${isActive ? 'active' : ''}">
                    <i data-lucide="${icon}" class="w-4 h-4"></i> ${label}
                </button>
            `;
        }

        // --- FUNÇÕES DE LÓGICA ---
        function setActiveTab(tab) {
            state.activeTab = tab;
            render();
        }

        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden', !show);
            modal.classList.toggle('flex', show);
        }

        async function removeLink(id) {
            state.links = state.links.filter(l => l.id !== id);
            await saveLinks();
            render();
            toggleModal(true); // Manter modal aberto
        }

        async function saveLinks() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;
            // delete existing links
            await sb.from('links').delete().eq('user_id', user.id);
            if (state.links.length > 0) {
                const linksToInsert = state.links.map(l => ({
                    user_id: user.id,
                    name: l.name,
                    url: l.url,
                    color: l.color
                }));
                await sb.from('links').insert(linksToInsert);
            }
        }

        // calendar helper
        async function saveEvents() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;
            const { error: delErr } = await sb.from('events').delete().eq('user_id', user.id);
            if (delErr) console.error('saveEvents delete error', delErr);
            if (state.events.length > 0) {
                const evts = state.events.map(e => ({
                    user_id: user.id,
                    // make sure we send a plain YYYY-MM-DD string; Supabase may convert date types
                    date: (e.date || '').split('T')[0],
                    text: e.text
                }));
                const { error: insErr } = await sb.from('events').insert(evts);
                if (insErr) console.error('saveEvents insert error', insErr);
            }
        }

        async function addEvent(date, text) {
            state.events.push({ id: Date.now().toString(), date, text });
            await saveEvents();
            render();
        }

        async function removeEvent(id) {
            state.events = state.events.filter(e => e.id !== id);
            await saveEvents();
            render();
        }

        // tasks
        async function saveTasks() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;
            const { error: delErr } = await sb.from('tasks').delete().eq('user_id', user.id);
            if (delErr) console.error('saveTasks delete error', delErr);
            if (state.tasks.length > 0) {
                const ts = state.tasks.map(t => ({
                    user_id: user.id,
                    text: t.text,
                    done: t.done
                }));
                const { error: insErr } = await sb.from('tasks').insert(ts);
                if (insErr) console.error('saveTasks insert error', insErr);
            }
        }

        async function addTask(text) {
            state.tasks.push({ id: Date.now().toString(), text, done: false });
            await saveTasks();
            render();
        }

        async function toggleTask(id) {
            state.tasks = state.tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
            await saveTasks();
            render();
        }

        async function removeTask(id) {
            state.tasks = state.tasks.filter(t => t.id !== id);
            await saveTasks();
            render();
        }

        // notes
        async function saveNotes() {
            const { data: { user } } = await sb.auth.getUser();            if (!user) return;
            const { error: delErr } = await sb.from('notes').delete().eq('user_id', user.id);
            if (delErr) console.error('saveNotes delete error', delErr);
            if (state.notes.length > 0) {
                const ns = state.notes.map(n => ({
                    user_id: user.id,
                    text: n.text
                }));
                const { error: insErr } = await sb.from('notes').insert(ns);
                if (insErr) console.error('saveNotes insert error', insErr);
            }
        }

        async function addNote(text) {
            state.notes.push({ id: Date.now().toString(), text });
            await saveNotes();
            render();
        }

        async function removeNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            await saveNotes();
            render();
        }

        function changeMonth(delta) {
            const m = state.currentMonth.getMonth() + delta;
            state.currentMonth.setMonth(m);
            state.selectedDate = null; // reset so it will pick default for new month
            render();
        }

        function selectDay(dateStr) {
            state.selectedDate = dateStr;
            render();
        }

        async function logout() {
            await sb.auth.signOut();
            state.isLoggedIn = false;
            render();
        }

        // apply current theme class to body
        function applyTheme() {
            document.body.classList.toggle('light', state.theme === 'light');
        }

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('pro_dashboard_theme', state.theme);
            render();
        }

        // format milliseconds to HH:MM:SS
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function formatDate(dateStr) {
            // expects a plain ISO date string (YYYY-MM-DD or YYYY-MM-DDTHH:mm:ss...)
            // avoid the timezone shift that occurs when using `new Date(...)` directly
            // by splitting the string ourselves and formatting manually.
            if (!dateStr) return '';
            const [ymd] = dateStr.split('T');
            const [year, month, day] = ymd.split('-');
            return `${day}/${month}/${year}`;
        }

        function startStopTimer() {
            if (state.timerRunning) {
                // stop
                clearInterval(state.timerIntervalId);
                state.timerElapsed += Date.now() - state.timerStart;
                state.timerRunning = false;
            } else {
                // start
                state.timerStart = Date.now();
                state.timerIntervalId = setInterval(() => {
                    const now = Date.now();
                    const displayed = state.timerElapsed + (now - state.timerStart);
                    const dispEl = document.getElementById('timerDisplay');
                    if (dispEl) dispEl.innerText = formatTime(displayed);
                }, 200);
                state.timerRunning = true;
            }
            render();
        }

        function resetTimer() {
            clearInterval(state.timerIntervalId);
            state.timerRunning = false;
            state.timerElapsed = 0;
            state.timerStart = null;
            const disp = document.getElementById('timerDisplay');
            if (disp) disp.innerText = formatTime(0);
            render();
        }

        function getContentForTab() {
            switch (state.activeTab) {
                case 'Dashboard':
                    return `
                        <!-- Stats Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="card p-6 rounded-2xl relative overflow-hidden group">
                                <div class="flex justify-between items-center mb-6">
                                    <div class="flex items-center gap-2 text-slate-400">
                                        <i data-lucide="timer" class="w-4 h-4"></i>
                                        <span class="text-xs font-bold uppercase tracking-wider">Tempo</span>
                                    </div>
                                    <span class="bg-cyan-500/20 text-cyan-400 text-[10px] font-bold px-2 py-0.5 rounded">0h</span>
                                </div>
                                <div class="text-4xl font-mono font-bold text-cyan-400 mb-4 tracking-widest">00:00:00</div>
                                <div class="w-full bg-[#2d2d2d] h-1.5 rounded-full overflow-hidden">
                                    <div class="bg-cyan-500 w-[0%] h-full"></div>
                                </div>
                                <p class="text-[10px] text-slate-500 mt-2">0% da meta (6h)</p>
                            </div>

                            <div class="card p-6 rounded-2xl">
                                <div class="flex items-center gap-2 text-slate-400 mb-6">
                                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                                    <span class="text-xs font-bold uppercase tracking-wider">Estatísticas</span>
                                </div>
                                <div class="text-center">
                                    <div class="text-4xl font-bold text-white mb-1">0</div>
                                    <div class="text-cyan-400 text-sm font-bold uppercase tracking-widest">Sessões</div>
                                </div>
                            </div>

                            <div class="card p-6 rounded-2xl">
                                <div class="flex items-center gap-2 text-slate-400 mb-6">
                                    <i data-lucide="users-2" class="w-4 h-4"></i>
                                    <span class="text-xs font-bold uppercase tracking-wider">Equipe</span>
                                </div>
                                <div class="text-center">
                                    <div class="text-4xl font-bold text-orange-500 mb-1">1</div>
                                    <div class="text-cyan-400 text-sm font-bold uppercase tracking-widest">Online</div>
                                </div>
                            </div>
                        </div>

                        <!-- Quick Links -->
                        <div class="mb-8">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center gap-2">
                                    <span>🚀</span>
                                    <h3 class="font-bold text-slate-300">Atalhos Rápidos</h3>
                                </div>
                                <button onclick="toggleModal(true)" class="text-xs text-cyan-400 hover:text-white transition-colors flex items-center gap-1 font-bold">
                                    <i data-lucide="plus" class="w-3 h-3"></i> GERIR ATALHOS
                                </button>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                ${state.links.map(link => `
                                    <a href="${link.url}" target="_blank" class="${link.color} flex items-center justify-center gap-3 py-3 rounded-lg font-bold text-sm hover:opacity-90 transition-all shadow-lg active:scale-95">
                                        <i data-lucide="globe" class="w-4 h-4"></i> ${link.name}
                                    </a>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Activity -->
                        <div class="card rounded-2xl overflow-hidden">
                            <div class="p-4 border-b border-[#2d2d2d] bg-[#252525] flex items-center gap-2">
                                <span>📈</span>
                                <h3 class="font-bold text-sm text-slate-300 uppercase tracking-widest">Atividade Recente</h3>
                            </div>
                            <div class="p-4 space-y-3 font-mono text-xs max-h-60 overflow-y-auto custom-scrollbar">
                                <div class="text-cyan-500 flex gap-4 p-2 bg-cyan-500/5 rounded">
                                    <span>${new Date().toLocaleTimeString()}</span>
                                    <span>- ${state.userEmail.split('@')[0]} online</span>
                                </div>
                                <div class="text-slate-500 flex gap-4 p-2">
                                    <span>${new Date().toLocaleTimeString()}</span>
                                    <span>- Acesso à Área de Trabalho 1</span>
                                </div>
                            </div>
                        </div>
                    `;
                case 'Cronómetro':
                    const currentTime = state.timerRunning
                        ? state.timerElapsed + (Date.now() - state.timerStart)
                        : state.timerElapsed;
                    return `
                        <div class="max-w-sm mx-auto text-center space-y-4">
                            <div id="timerDisplay" class="text-4xl font-mono font-bold text-cyan-400">${formatTime(currentTime)}</div>
                            <div class="flex justify-center gap-4">
                                <button onclick="startStopTimer()" class="px-4 py-2 bg-cyan-500 rounded-xl text-black font-bold">
                                    ${state.timerRunning ? 'Parar' : 'Iniciar'}
                                </button>
                                <button onclick="resetTimer()" class="px-4 py-2 bg-red-500 rounded-xl text-black font-bold">Reset</button>
                            </div>
                        </div>
                    `;
                case 'Tarefas':
                    return `
                        <div class="max-w-lg mx-auto space-y-6">
                            <h3 class="text-xl font-bold text-white">Tarefas</h3>
                            <form id="taskForm" class="flex gap-2">
                                <input type="text" id="taskInput" class="flex-1 bg-[#121212] border border-[#333] p-2 rounded-lg text-white" placeholder="Nova tarefa" required>
                                <button type="submit" class="bg-cyan-500 px-4 rounded-lg text-black font-bold">Adicionar</button>
                            </form>
                            <div class="space-y-2">
                                ${state.tasks.map(t=>`
                                    <div class="flex items-center justify-between p-2 bg-[#1e1e1e] rounded-lg">
                                        <label class="flex items-center gap-2">
                                            <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')" />
                                            <span class="${t.done?'line-through text-slate-500':''}">${t.text}</span>
                                        </label>
                                        <button onclick="removeTask('${t.id}')" class="text-red-500 hover:bg-red-500/10 p-1 rounded">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                `).join('')}
                                ${state.tasks.length===0?'<p class="text-slate-500">Sem tarefas.</p>':''}
                            </div>
                        </div>
                    `;
                case 'Notas':
                    return `
                        <div class="max-w-lg mx-auto space-y-6">
                            <h3 class="text-xl font-bold text-white">Notas</h3>
                            <form id="noteForm" class="flex gap-2">
                                <input type="text" id="noteInput" class="flex-1 bg-[#121212] border border-[#333] p-2 rounded-lg text-white" placeholder="Nova nota" required>
                                <button type="submit" class="bg-cyan-500 px-4 rounded-lg text-black font-bold">Adicionar</button>
                            </form>
                            <div class="space-y-2">
                                ${state.notes.map(n=>`
                                    <div class="flex justify-between p-2 bg-[#1e1e1e] rounded-lg">
                                        <span class="text-sm">${n.text}</span>
                                        <button onclick="removeNote('${n.id}')" class="text-red-500 hover:bg-red-500/10 p-1 rounded">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                `).join('')}
                                ${state.notes.length===0?'<p class="text-slate-500">Sem notas.</p>':''}
                            </div>
                        </div>
                    `;
                case 'Equipe':
                    return `<div class="text-white">👥 <strong>Equipe</strong> (apenas você está online)</div>`;
                case 'Calendário':
                    if (!state.selectedDate) {
                        state.selectedDate = new Date().toISOString().split('T')[0];
                    }
                    const year = state.currentMonth.getFullYear();
                    const month = state.currentMonth.getMonth();
                    const monthName = state.currentMonth.toLocaleString(undefined,{month:'long'});
                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);
                    const startWeekDay = firstDay.getDay();
                    const daysInMonth = lastDay.getDate();
                    let cells = [];
                    for (let i = 0; i < startWeekDay; i++) cells.push('');
                    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
                    const selected = state.selectedDate || (new Date()).toISOString().split('T')[0];
                    const dayEvents = state.events.filter(e => e.date === selected);
                    return `
                        <div class="max-w-lg mx-auto space-y-6">
                            <h3 class="text-xl font-bold text-white">${monthName} ${year}</h3>
                            <div class="flex justify-between">
                                <button onclick="changeMonth(-1)" class="text-white">‹</button>
                                <button onclick="changeMonth(1)" class="text-white">›</button>
                            </div>
                            <div class="grid grid-cols-7 text-center mt-2">
                                ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(w=>`<div class="font-bold text-slate-400">${w}</div>`).join('')}
                                ${cells.map(d=>{
                                    if(!d) return `<div></div>`;
                                    const day = d;
                                    const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                                    const isSel = state.selectedDate===dateStr;
                                    const hasEvt = state.events.some(e=>e.date===dateStr);
                                    return `<div onclick="selectDay('${dateStr}')" class="p-2 border cursor-pointer ${isSel?'bg-cyan-500':''} ${hasEvt?'cell-with-event':''}">${day}</div>`;
                                }).join('')}
                            </div>
                            <div>
                                <h4 class="text-white">Eventos em ${formatDate(selected)}</h4>
                                <form id="eventForm" class="flex gap-2">
                                    <input type="text" id="eventText" placeholder="Descrição" class="flex-1 bg-[#121212] border border-[#333] p-2 rounded-lg text-white" required>
                                    <button type="submit" class="bg-cyan-500 px-4 rounded-lg text-black font-bold"${!state.selectedDate?' disabled':''}>Adicionar</button>
                                </form>
                                <div id="eventList" class="space-y-2">
                                    ${dayEvents.map(e=>`
                                        <div class="flex justify-between items-center p-2 bg-[#1e1e1e] rounded-lg">
                                            <div class="text-sm">
                                                <span class="font-mono">${formatDate(e.date)}</span> – ${e.text}
                                            </div>
                                            <button onclick="removeEvent('${e.id}')" class="text-red-500 hover:bg-red-500/10 p-1 rounded">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                    ${dayEvents.length===0?'<p class="text-slate-500">Sem eventos neste dia.</p>':''}
                                </div>
                            </div>
                        </div>
                    `;
                default:
                    return `<div class="text-white">Página desconhecida</div>`;
            }
        }

        async function loadUserData() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;

            // Links
            const { data: links, error: linksErr } = await sb.from('links').select('*').eq('user_id', user.id);
            if (linksErr) console.error('loadUserData links:', linksErr);
            state.links = links && links.length ? links.map(l=>({ id: l.id, name: l.name, url: l.url, color: l.color })) : INITIAL_LINKS.slice();

            // Events
            const { data: events, error: eventsErr } = await sb.from('events').select('*').eq('user_id', user.id);
            if (eventsErr) console.error('loadUserData events:', eventsErr);
            // normalize date strings to YYYY-MM-DD so we don't run into TZ issues later
            state.events = (events || []).map(e => ({ ...e, date: (e.date || '').split('T')[0] }));

            // Tasks
            const { data: tasks, error: tasksErr } = await sb.from('tasks').select('*').eq('user_id', user.id);
            if (tasksErr) console.error('loadUserData tasks:', tasksErr);
            state.tasks = tasks || [];

            // Notes
            const { data: notes, error: notesErr } = await sb.from('notes').select('*').eq('user_id', user.id);
            if (notesErr) console.error('loadUserData notes:', notesErr);
            state.notes = notes || [];
        }

        // Início
        render();
    </script>
</body>

</html>
